permissions:
  contents: read
name: Test - E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  playwright:
    timeout-minutes: 7
    runs-on: ubuntu-latest
    container:
      # Keep this version in sync with the @playwright/test version in package.json
      # so the browsers pre-installed in the image match (no separate install step).
      image: mcr.microsoft.com/playwright:v1.61.0-noble
      options: --user 1001
    env:
      NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: ${{ secrets.NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME }}
      NEXT_PUBLIC_FATHOM_ID: ${{ secrets.NEXT_PUBLIC_FATHOM_ID }}
      NEXT_PUBLIC_POSTHOG_KEY: ${{ secrets.NEXT_PUBLIC_POSTHOG_KEY }}
      RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
      RESEND_NEWSLETTER_AUDIENCE_ID: ${{ secrets.RESEND_NEWSLETTER_AUDIENCE_ID }}
      RESEND_SIGNING_SECRET: ${{ secrets.RESEND_SIGNING_SECRET }}
      UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
      UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: 'package.json'
          cache: 'pnpm'

      - name: Install deps
        run: pnpm install

      # The playwright container already ships the browsers, so no install step
      # is needed. Build in its own step so build time is separate from the test
      # budget and the Next.js cache can be reused across runs.
      - name: Cache Next.js build
        uses: actions/cache@v6
        with:
          path: ${{ github.workspace }}/.next/cache
          key: nextjs-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('**/*.[jt]s', '**/*.[jt]sx') }}
          restore-keys: |
            nextjs-${{ hashFiles('pnpm-lock.yaml') }}-

      - name: Build
        run: pnpm build

      - name: Run Playwright tests
        run: pnpm exec playwright test

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
